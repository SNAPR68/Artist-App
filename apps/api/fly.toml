app = "artist-booking-api"
primary_region = "bom"  # Mumbai

[build]
  dockerfile = "../../infrastructure/docker/api.Dockerfile"
  dockerignore = "../../.dockerignore"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
