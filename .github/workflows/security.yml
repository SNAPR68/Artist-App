name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: pnpm audit --prod --audit-level=moderate
        continue-on-error: true

      - name: Generate audit report
        if: always()
        run: pnpm audit --json > npm-audit-report.json
        continue-on-error: true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

  secret-scanning:
    name: Secret Detection
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true

  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'artist-booking-platform'
          path: '.'
          format: 'JSON'
          args: >
            --exclude node_modules
            --enable-retired

      - name: Upload dependency check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 30

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'typescript']
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
          upload: false

      - name: Upload CodeQL results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results-${{ matrix.language }}
          path: ${{ runner.temp }}/codeql-results/
          retention-days: 30

  snyk-scan:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate with Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}
        if: secrets.SNYK_TOKEN != ''
        continue-on-error: true

      - name: Run Snyk scan
        run: snyk test --all-projects --json > snyk-report.json
        continue-on-error: true

      - name: Upload Snyk report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-report.json
          retention-days: 30

  env-validation:
    name: Environment Variable Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          # Check for common secret patterns in source files
          if grep -r "apiKey\|API_KEY\|secret\|SECRET\|password\|PASSWORD" \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
            --include="*.json" --include=".env.example" \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=.next \
            | grep -E "=\s*['\"].*['\"]|:\s*['\"].*['\"]"; then
            echo "❌ Potential hardcoded secrets found!"
            exit 1
          fi
          echo "✅ No obvious hardcoded secrets detected"

  results:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [npm-audit, secret-scanning, dependency-check, codeql, snyk-scan, env-validation]
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.npm-audit.result }}" == "failure" ] || \
             [ "${{ needs.secret-scanning.result }}" == "failure" ] || \
             [ "${{ needs.dependency-check.result }}" == "failure" ] || \
             [ "${{ needs.env-validation.result }}" == "failure" ]; then
            echo "⚠️ Security scans completed with warnings"
          else
            echo "✅ Security scans passed"
          fi
