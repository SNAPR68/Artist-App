name: Deploy Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy API to Fly.io (Staging)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:migrate

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config apps/api/fly.toml --remote-only

      - name: Deploy hold-expiry worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config apps/api/fly.worker-hold-expiry.toml --remote-only

      - name: Smoke test
        env:
          API_URL: ${{ vars.STAGING_API_URL }}
        run: |
          sleep 10
          curl -sf "$API_URL/health" | grep -q '"ok"'
          echo "Smoke test passed"

  # Frontend auto-deploys via Vercel Git integration — no workflow needed
  # Vercel watches the 'develop' branch for preview deployments
