name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy API to Fly.io (Production)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:migrate

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config apps/api/fly.toml --remote-only

      - name: Deploy hold-expiry worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config apps/api/fly.worker-hold-expiry.toml --remote-only

      - name: Deploy sync worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config apps/api/fly.worker-sync.toml --remote-only

      - name: Smoke tests
        env:
          API_URL: ${{ vars.PRODUCTION_API_URL }}
          WEB_URL: ${{ vars.PRODUCTION_WEB_URL }}
        run: |
          sleep 10
          curl -sf "$API_URL/health" | grep -q '"ok"'
          echo "API health check passed"

      - name: Health check Web
        env:
          WEB_URL: ${{ vars.PRODUCTION_WEB_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${WEB_URL:-https://artist-booking-web.vercel.app}")
          if [ "$STATUS" != "200" ]; then echo "Web health check failed: $STATUS"; exit 1; fi
          echo "Web health check passed"

      - name: Search endpoint check
        env:
          API_URL: ${{ vars.PRODUCTION_API_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL:-https://artist-booking-api.onrender.com}/v1/search/artists")
          if [ "$STATUS" != "200" ]; then echo "Search check failed: $STATUS"; exit 1; fi
          echo "Search endpoint check passed"

      - name: API version check
        env:
          API_URL: ${{ vars.PRODUCTION_API_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL:-https://artist-booking-api.onrender.com}/v1")
          if [ "$STATUS" != "200" ]; then echo "API version check failed: $STATUS"; exit 1; fi
          echo "All smoke tests passed"

  # Frontend auto-deploys via Vercel Git integration
  # Vercel watches 'main' branch for production deployments
