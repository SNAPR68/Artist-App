services:
  - type: web
    name: artist-booking-api
    runtime: node
    region: singapore
    plan: starter
    numInstances: 1
    buildCommand: HUSKY=0 NODE_ENV=development pnpm install && pnpm --filter @artist-booking/shared build && cd apps/api && npx tsc -p tsconfig.build.json && npx tsc-alias -p tsconfig.build.json
    startCommand: cd apps/api && node dist/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PII_ENCRYPTION_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /health
