version: '3.8'

services:
  # Note: All API credentials (DATABASE_URL, REDIS_URL, API_KEYS) should be provided via .env file
  # Example: docker-compose --env-file ../../.env up
  postgres:
    image: postgres:15-alpine
    container_name: ab-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: artist_booking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ab-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.16.0
    container_name: ab-opensearch
    ports:
      - '9200:9200'
      - '9600:9600'
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=false
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin@123
      - 'OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m'
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:9200 | grep -q cluster_name']
      interval: 15s
      timeout: 10s
      retries: 5

  localstack:
    image: localstack/localstack:3.7
    container_name: ab-localstack
    ports:
      - '4566:4566'
    environment:
      - SERVICES=s3,sqs
      - DEFAULT_REGION=ap-south-1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack-init.sh:/etc/localstack/init/ready.d/init.sh

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  localstack_data:
